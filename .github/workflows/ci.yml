name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Drift watchdog: regenerate the differential vectors against the LATEST
  # QuantLib on a schedule, so a real-world calendar change surfaces as a red
  # run even when the repo is quiet. pip installs QuantLib unpinned on purpose.
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: pip install QuantLib
      - run: npm run vectors
      - run: npm run build
      - run: npm test
